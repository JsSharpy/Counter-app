<body class="bg-stone-950">
<div id="root">
  <div style="min-height:100vh;background:#0c0a09;color:#a8a29e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;padding:24px;text-align:center;">
    <div style="width:32px;height:32px;border:3px solid #292524;border-top-color:#fbbf24;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;"></div>

  </div>

<script>
  // Watchdog: if the React app hasn't replaced the loading placeholder within
  // 8 seconds, one of the CDN scripts likely failed to load (e.g. a flaky
  // mobile connection). Show a clear message instead of leaving a spinner
  // (or nothing) on screen forever.
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.querySelector(".counter-app-mounted") === null) {
      root.innerHTML =
        '<div style="min-height:100vh;background:#0c0a09;color:#f5f5f4;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;padding:24px;text-align:center;">' +
        '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">Couldn\'t load the app</div>' +
        '<div style="font-size:13px;color:#a8a29e;margin-bottom:20px;max-width:320px;">This usually means a slow or unstable connection. Check your signal and reload.</div>' +
        '<button onclick="window.location.reload()" style="background:#fbbf24;color:#0c0a09;font-weight:700;border:none;border-radius:10px;padding:10px 20px;font-size:14px;">Reload</button>' +
        "</div>";
    }
  }, 8000);
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function toPascalCase(kebab) {
  return kebab.split("-").map((p) => p.charAt(0).toUpperCase() + p.slice(1)).join("");
}
function Icon({ name, size = 18, strokeWidth = 2, className = "" }) {
  const ref = React.useRef(null);
  useEffect(() => {
    try {
      if (!ref.current || !window.lucide || !window.lucide.icons) return;
      const iconNode = window.lucide.icons[toPascalCase(name)];
      if (!iconNode) return;
      const svg = window.lucide.createElement(iconNode);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke-width", strokeWidth);
      if (className) svg.setAttribute("class", (svg.getAttribute("class") || "") + " " + className);
      ref.current.innerHTML = "";
      ref.current.appendChild(svg);
    } catch (e) { console.warn("Icon render failed for", name, e); }
  }, [name, size, strokeWidth, className]);
  return <span ref={ref} style={{ display: "inline-flex", lineHeight: 0 }} />;
}

// ---------- Storage (localStorage, persists across launches) ----------
const LS_PREFIX = "counter_pos_";
function storeGet(key, fallback) {
  try { const raw = localStorage.getItem(LS_PREFIX + key); return raw != null ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
}
function storeSet(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); }
  catch (e) { console.error("storage set failed", e); }
}

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const CURRENCY = "₱";
const money = (n) => CURRENCY + (Number(n) || 0).toLocaleString("en-PH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const todayKey = (d = new Date()) => d.toISOString().slice(0, 10);
const fmtQty = (n, unit) => unit === "kg" ? (Math.round((Number(n)||0)*100)/100).toString() : String(Math.round(Number(n)||0));
const unitLabel = (unit) => unit === "kg" ? "kg" : "pc";
const fmtDate = (ts) => new Date(ts).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });

// ---------- ROOT APP ----------
function App() {
  const [tab, setTab] = useState("sell");
  const [products, setProducts] = useState(() => storeGet("products", []));
  const [sales, setSales] = useState(() => storeGet("sales", []));
  const [utangs, setUtangs] = useState(() => storeGet("utangs", []));
  const [toast, setToast] = useState(null);
  const [cart, setCart] = useState({});

  useEffect(() => { storeSet("products", products); }, [products]);
  useEffect(() => { storeSet("sales", sales); }, [sales]);
  useEffect(() => { storeSet("utangs", utangs); }, [utangs]);

  function flash(msg) { setToast(msg); setTimeout(() => setToast(null), 1800); }

  function addProduct(p) { setProducts((prev) => [...prev, { id: uid(), ...p }]); flash(`Added "${p.name}"`); }
  function updateProduct(id, patch) { setProducts((prev) => prev.map((p) => p.id === id ? { ...p, ...patch } : p)); }
  function deleteProduct(id) {
    setProducts((prev) => prev.filter((p) => p.id !== id));
    setCart((prev) => { const n = { ...prev }; delete n[id]; return n; });
  }

  function addToCart(id, step) {
    const p = products.find((x) => x.id === id); if (!p) return;
    const inc = step != null ? step : p.unit === "kg" ? 0.25 : 1;
    setCart((prev) => {
      const current = prev[id] || 0;
      const next = Math.round((current + inc) * 1000) / 1000;
      if (next > p.stock) { flash(`Only ${fmtQty(p.stock, p.unit)} ${unitLabel(p.unit)} left of "${p.name}"`); return prev; }
      return { ...prev, [id]: next };
    });
  }
  function setCartQty(id, qty) {
    const p = products.find((x) => x.id === id); if (!p) return;
    let q = Math.max(0, Math.min(qty, p.stock));
    q = p.unit === "kg" ? Math.round(q * 1000) / 1000 : Math.round(q);
    setCart((prev) => { const n = { ...prev, [id]: q }; if (q <= 0) delete n[id]; return n; });
  }

  const cartItems = useMemo(() =>
    Object.entries(cart).map(([id, qty]) => {
      const p = products.find((x) => x.id === id); if (!p) return null;
      return { productId: id, name: p.name, qty, price: p.price, cost: p.cost || 0, unit: p.unit || "pc" };
    }).filter(Boolean), [cart, products]);
  const cartTotal = cartItems.reduce((sum, i) => sum + i.qty * i.price, 0);

  function deductStock(items) {
    setProducts((prev) => prev.map((p) => {
      const item = items.find((i) => i.productId === p.id);
      return item ? { ...p, stock: Math.max(0, p.stock - item.qty) } : p;
    }));
  }

  function completeSale() {
    if (cartItems.length === 0) return;
    setSales((prev) => [...prev, { id: uid(), ts: Date.now(), items: cartItems, total: cartTotal }]);
    deductStock(cartItems); setCart({}); flash(`Sale recorded — ${money(cartTotal)}`);
  }

  function completeUtang(customerName) {
    if (cartItems.length === 0 || !customerName.trim()) return;
    setUtangs((prev) => [...prev, { id: uid(), customerName: customerName.trim(), ts: Date.now(), items: cartItems, total: cartTotal, payments: [], settled: false }]);
    deductStock(cartItems); setCart({}); flash(`Utang ni ${customerName.trim()} — ${money(cartTotal)}`);
  }

  function addPayment(utangId, amount) {
    setUtangs((prev) => prev.map((u) => {
      if (u.id !== utangId) return u;
      const payments = [...u.payments, { id: uid(), ts: Date.now(), amount }];
      const totalPaid = payments.reduce((s, p) => s + p.amount, 0);
      return { ...u, payments, settled: totalPaid >= u.total };
    }));
  }

  function deleteUtang(id) { setUtangs((prev) => prev.filter((u) => u.id !== id)); }

  const pendingUtangs = utangs.filter((u) => !u.settled).length;

  return (
    <div className="counter-app-mounted min-h-screen bg-stone-950 text-stone-100 flex flex-col">
      <header className="safe-top sticky top-0 z-30 bg-stone-950/95 backdrop-blur border-b border-stone-800 px-4 py-3 flex items-center gap-2">
        <div className="w-8 h-8 rounded-md bg-amber-400 flex items-center justify-center text-stone-950 font-black text-sm">₱</div>
        <h1 className="text-lg font-bold tracking-tight">Counter</h1>
      </header>
      <main className="flex-1 overflow-y-auto pb-24">
        {tab === "sell" && <SellTab products={products} cart={cart} cartItems={cartItems} cartTotal={cartTotal} onAdd={addToCart} onSetQty={setCartQty} onComplete={completeSale} onUtang={completeUtang} />}
        {tab === "inventory" && <InventoryTab products={products} onAdd={addProduct} onUpdate={updateProduct} onDelete={deleteProduct} />}
        {tab === "utang" && <UtangTab utangs={utangs} onAddPayment={addPayment} onDelete={deleteUtang} />}
        {tab === "reports" && <ReportsTab sales={sales} products={products} />}
      </main>
      <nav className="safe-bottom fixed bottom-0 left-0 right-0 z-30 bg-stone-900 border-t border-stone-800 flex">
        {[
          { id: "sell", label: "Sell", icon: "receipt", badge: Object.values(cart).reduce((a,b)=>a+b,0) },
          { id: "inventory", label: "Stock", icon: "package" },
          { id: "utang", label: "Utang", icon: "hand-coins", badge: pendingUtangs },
          { id: "reports", label: "Reports", icon: "bar-chart-3" },
        ].map(({ id, label, icon, badge }) => (
          <button key={id} onClick={() => setTab(id)}
            className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 relative transition-colors ${tab === id ? "text-amber-400" : "text-stone-500"}`}>
            <Icon name={icon} size={20} strokeWidth={tab === id ? 2.5 : 2} />
            <span className="text-[11px] font-medium">{label}</span>
            {badge > 0 && <span className="absolute top-1 right-1/2 translate-x-3 bg-amber-400 text-stone-950 text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">{badge}</span>}
          </button>
        ))}
      </nav>
      {toast && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-amber-400 text-stone-950 text-sm font-semibold px-4 py-2 rounded-full shadow-lg z-50 whitespace-nowrap">{toast}</div>}
    </div>
  );
}

// ---------- SELL TAB ----------
function SellTab({ products, cart, cartItems, cartTotal, onAdd, onSetQty, onComplete, onUtang }) {
  const [query, setQuery] = useState("");
  const [showReceipt, setShowReceipt] = useState(false);
  const filtered = products.filter((p) => p.name.toLowerCase().includes(query.toLowerCase()));
  const itemCount = cartItems.reduce((a, i) => a + i.qty, 0);

  return (
    <div className="px-4 pt-3">
      <div className="relative mb-3">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500"><Icon name="search" size={16} /></span>
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search products…"
          className="w-full bg-stone-900 border border-stone-800 rounded-xl pl-9 pr-3 py-2.5 text-sm placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-400/60" />
      </div>
      {products.length === 0 ? <EmptyState icon="package" title="No products yet" body="Add products in the Stock tab first." />
        : filtered.length === 0 ? <EmptyState icon="search" title="No matches" body={`Nothing found for "${query}".`} />
        : (
        <div className={`space-y-2 ${itemCount > 0 ? "pb-32" : "pb-2"}`}>
          {filtered.map((p) => {
            const unit = p.unit || "pc"; const isKg = unit === "kg";
            const qty = cart[p.id] || 0; const out = p.stock <= 0;
            return (
              <div key={p.id} className={`rounded-xl border p-3 transition-colors ${out ? "bg-stone-900/50 border-stone-800 opacity-50" : qty > 0 ? "bg-amber-400/10 border-amber-400/60" : "bg-stone-900 border-stone-800"}`}>
                <div className="flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm leading-tight mb-0.5 truncate">{p.name}</div>
                    <div className="text-amber-400 font-bold text-sm">{money(p.price)}{isKg && <span className="text-stone-500 font-normal">/kg</span>}</div>
                    <div className={`text-[11px] mt-0.5 ${out ? "text-red-400" : "text-stone-500"}`}>{out ? "Out of stock" : `${fmtQty(p.stock, unit)} ${unitLabel(unit)} left`}</div>
                  </div>
                  {!out && !isKg && (qty === 0
                    ? <button onClick={() => onAdd(p.id)} className="bg-amber-400 text-stone-950 font-bold text-sm rounded-lg px-3.5 py-2 active:scale-95 shrink-0">Add</button>
                    : <div className="flex items-center gap-2 shrink-0">
                        <button onClick={() => onSetQty(p.id, qty-1)} className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center"><Icon name="minus" size={15} /></button>
                        <span className="w-6 text-center text-sm font-bold">{qty}</span>
                        <button onClick={() => onSetQty(p.id, qty+1)} disabled={qty >= p.stock} className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center disabled:opacity-40"><Icon name="plus" size={15} /></button>
                      </div>
                  )}
                  {!out && isKg && qty === 0 && <button onClick={() => onAdd(p.id, 0.25)} className="bg-amber-400 text-stone-950 font-bold text-sm rounded-lg px-3.5 py-2 active:scale-95 shrink-0">Add</button>}
                </div>
                {!out && isKg && qty > 0 && (
                  <div className="mt-2.5 pt-2.5 border-t border-stone-800/70">
                    <div className="flex items-center gap-2 mb-2">
                      <input type="number" inputMode="decimal" step="0.05" min="0" value={qty} onChange={(e) => onSetQty(p.id, parseFloat(e.target.value)||0)}
                        className="w-20 bg-stone-950 border border-stone-700 rounded-lg px-2.5 py-1.5 text-sm font-bold text-center focus:outline-none focus:ring-2 focus:ring-amber-400/60" />
                      <span className="text-xs text-stone-500">kg ·</span>
                      <span className="text-sm font-bold text-amber-400">{money(qty * p.price)}</span>
                      <button onClick={() => onSetQty(p.id, 0)} className="ml-auto text-stone-500 p-1.5 rounded-lg bg-stone-800"><Icon name="x" size={14} /></button>
                    </div>
                    <div className="flex gap-1.5">
                      {[0.25, 0.5, 1].map((step) => <button key={step} onClick={() => onAdd(p.id, step)} disabled={qty >= p.stock} className="flex-1 bg-stone-800 disabled:opacity-40 text-xs font-semibold rounded-lg py-1.5">+{step} kg</button>)}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {itemCount > 0 && (
        <div className="fixed bottom-16 left-0 right-0 z-20 bg-stone-900 border-t border-amber-400/30 px-4 py-3">
          <div className="flex items-center justify-between mb-2.5">
            <span className="text-xs text-stone-400">{cartItems.length} product(s)</span>
            <span className="text-lg font-bold text-amber-400">{money(cartTotal)}</span>
          </div>
          <button onClick={() => setShowReceipt(true)} className="w-full bg-amber-400 text-stone-950 font-bold rounded-xl py-3 flex items-center justify-center gap-2">
            <Icon name="check" size={18} strokeWidth={3} /> Charge {money(cartTotal)}
          </button>
        </div>
      )}
      {showReceipt && <CartSheet items={cartItems} total={cartTotal} onClose={() => setShowReceipt(false)} onSetQty={onSetQty}
        onComplete={() => { onComplete(); setShowReceipt(false); }}
        onUtang={(name) => { onUtang(name); setShowReceipt(false); }} />}
    </div>
  );
}

// ---------- CART SHEET ----------
function CartSheet({ items, total, onClose, onSetQty, onComplete, onUtang }) {
  const [mode, setMode] = useState("sale");
  const [customerName, setCustomerName] = useState("");
  return (
    <div className="fixed inset-0 z-40 flex items-end">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div className="relative w-full bg-stone-950 rounded-t-2xl border-t border-stone-800 max-h-[85vh] flex flex-col">
        <div className="flex items-center justify-between px-4 py-3 border-b border-stone-800">
          <h2 className="font-bold">Confirm sale</h2>
          <button onClick={onClose} className="text-stone-500 p-1"><Icon name="x" size={20} /></button>
        </div>
        <div className="overflow-y-auto px-4 py-2 flex-1">
          {items.map((it) => (
            <div key={it.productId} className="flex items-center justify-between py-2.5 border-b border-stone-900">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-sm font-medium truncate">{it.name}</div>
                <div className="text-xs text-stone-500">{money(it.price)} {it.unit === "kg" ? "/kg" : "each"}</div>
              </div>
              {it.unit === "kg"
                ? <div className="flex items-center gap-1.5">
                    <input type="number" inputMode="decimal" step="0.05" min="0" value={it.qty} onChange={(e) => onSetQty(it.productId, parseFloat(e.target.value)||0)}
                      className="w-16 bg-stone-900 border border-stone-700 rounded-lg px-2 py-1 text-sm font-semibold text-center focus:outline-none" />
                    <span className="text-xs text-stone-500">kg</span>
                  </div>
                : <div className="flex items-center gap-2">
                    <button onClick={() => onSetQty(it.productId, it.qty-1)} className="w-7 h-7 rounded-full bg-stone-800 flex items-center justify-center"><Icon name="minus" size={14} /></button>
                    <span className="w-5 text-center text-sm font-semibold">{it.qty}</span>
                    <button onClick={() => onSetQty(it.productId, it.qty+1)} className="w-7 h-7 rounded-full bg-stone-800 flex items-center justify-center"><Icon name="plus" size={14} /></button>
                  </div>
              }
              <div className="w-20 text-right text-sm font-bold ml-2">{money(it.qty * it.price)}</div>
            </div>
          ))}
        </div>
        <div className="safe-bottom px-4 pt-3 pb-4 border-t border-stone-800 bg-stone-900/50">
          <div className="flex items-center justify-between mb-3">
            <span className="text-stone-400 text-sm">Total</span>
            <span className="text-xl font-bold text-amber-400">{money(total)}</span>
          </div>
          <div className="grid grid-cols-2 gap-2 mb-3">
            <button onClick={() => setMode("sale")} className={`rounded-lg py-2 text-sm font-semibold border transition-colors ${mode === "sale" ? "bg-amber-400 text-stone-950 border-amber-400" : "bg-stone-800 text-stone-400 border-stone-700"}`}>💵 Bayad na</button>
            <button onClick={() => setMode("utang")} className={`rounded-lg py-2 text-sm font-semibold border transition-colors ${mode === "utang" ? "bg-red-500 text-white border-red-500" : "bg-stone-800 text-stone-400 border-stone-700"}`}>📋 Utang</button>
          </div>
          {mode === "utang" && (
            <input value={customerName} onChange={(e) => setCustomerName(e.target.value)} placeholder="Pangalan ng customer…"
              className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-red-400/60" />
          )}
          {mode === "sale"
            ? <button onClick={onComplete} className="w-full bg-amber-400 text-stone-950 font-bold rounded-xl py-3 flex items-center justify-center gap-2"><Icon name="check" size={18} strokeWidth={3} /> Complete Sale</button>
            : <button onClick={() => customerName.trim() && onUtang(customerName)} disabled={!customerName.trim()}
                className="w-full bg-red-500 disabled:bg-stone-800 disabled:text-stone-600 text-white font-bold rounded-xl py-3 flex items-center justify-center gap-2">
                <Icon name="hand-coins" size={18} /> I-utang kay {customerName.trim() || "…"}
              </button>
          }
        </div>
      </div>
    </div>
  );
}

// ---------- UTANG TAB ----------
function UtangTab({ utangs, onAddPayment, onDelete }) {
  const [filter, setFilter] = useState("pending");
  const [search, setSearch] = useState("");
  const [payingId, setPayingId] = useState(null);

  const byCustomer = useMemo(() => {
    const map = {};
    utangs.filter((u) => !u.settled).forEach((u) => {
      if (!map[u.customerName]) map[u.customerName] = { name: u.customerName, balance: 0, count: 0 };
      const paid = u.payments.reduce((s, p) => s + p.amount, 0);
      map[u.customerName].balance += u.total - paid;
      map[u.customerName].count += 1;
    });
    return Object.values(map).sort((a, b) => b.balance - a.balance);
  }, [utangs]);

  const totalPending = utangs.filter((u) => !u.settled).reduce((s, u) => {
    const paid = u.payments.reduce((pp, p) => pp + p.amount, 0);
    return s + (u.total - paid);
  }, 0);

  const filtered = utangs
    .filter((u) => filter === "all" ? true : filter === "pending" ? !u.settled : u.settled)
    .filter((u) => u.customerName.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => b.ts - a.ts);

  return (
    <div className="px-4 pt-3">
      {byCustomer.length > 0 && (
        <div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 mb-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm text-red-300">Total na utang</span>
            <span className="text-lg font-bold text-red-400">{money(totalPending)}</span>
          </div>
          {byCustomer.map((c) => (
            <div key={c.name} className="flex items-center justify-between text-xs py-0.5">
              <span className="text-stone-400">{c.name} <span className="text-stone-600">({c.count})</span></span>
              <span className="text-red-400 font-semibold">{money(c.balance)}</span>
            </div>
          ))}
        </div>
      )}
      <div className="relative mb-3">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500"><Icon name="search" size={16} /></span>
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Hanapin ang pangalan…"
          className="w-full bg-stone-900 border border-stone-800 rounded-xl pl-9 pr-3 py-2.5 text-sm placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-400/60" />
      </div>
      <div className="flex gap-2 mb-4">
        {[{ id: "pending", label: "May utang" }, { id: "settled", label: "Bayad na" }, { id: "all", label: "Lahat" }].map((f) => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors ${filter === f.id ? "bg-amber-400 text-stone-950 border-amber-400" : "bg-stone-900 text-stone-400 border-stone-800"}`}>{f.label}</button>
        ))}
      </div>
      {filtered.length === 0
        ? <EmptyState icon="hand-coins" title="Walang utang" body={filter === "pending" ? "Wala pang hindi pa nababayaran." : "Walang nahanap."} />
        : <div className="space-y-2">{filtered.map((u) => <UtangRow key={u.id} utang={u} onAddPayment={onAddPayment} onDelete={onDelete} isPayingOpen={payingId === u.id} onTogglePay={() => setPayingId(payingId === u.id ? null : u.id)} />)}</div>
      }
    </div>
  );
}

function UtangRow({ utang, onAddPayment, onDelete, isPayingOpen, onTogglePay }) {
  const [open, setOpen] = useState(false);
  const [payAmt, setPayAmt] = useState("");
  const totalPaid = utang.payments.reduce((s, p) => s + p.amount, 0);
  const balance = Math.max(0, utang.total - totalPaid);
  const canPay = Number(payAmt) > 0 && Number(payAmt) <= balance + 0.01;

  return (
    <div className={`rounded-xl border overflow-hidden ${utang.settled ? "border-stone-800 opacity-60" : "border-red-500/30"}`}>
      <button onClick={() => setOpen((v) => !v)} className="w-full flex items-center justify-between px-3.5 py-3 bg-stone-900 text-left">
        <div>
          <div className="flex items-center gap-2">
            <span className="text-sm font-bold">{utang.customerName}</span>
            {utang.settled && <span className="text-[10px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full font-semibold">Bayad</span>}
          </div>
          <div className="text-xs text-stone-500 mt-0.5">{fmtDate(utang.ts)}</div>
        </div>
        <div className="flex items-center gap-2">
          <div className="text-right">
            {!utang.settled && <div className="text-sm font-bold text-red-400">{money(balance)}</div>}
            <div className={`text-xs ${utang.settled ? "text-green-400 font-semibold" : "text-stone-500"}`}>{utang.settled ? "Bayad na" : `ng ${money(utang.total)}`}</div>
          </div>
          <Icon name={open ? "chevron-up" : "chevron-down"} size={16} className="text-stone-500" />
        </div>
      </button>
      {open && (
        <div className="px-3.5 pb-3 pt-2 border-t border-stone-800 bg-stone-950 space-y-3">
          <div>
            <div className="text-[11px] text-stone-500 font-semibold mb-1 uppercase tracking-wide">Items</div>
            {utang.items.map((it, i) => (
              <div key={i} className="flex justify-between text-xs py-1 text-stone-400">
                <span>{fmtQty(it.qty, it.unit)} {unitLabel(it.unit)} × {it.name}</span>
                <span>{money(it.qty * it.price)}</span>
              </div>
            ))}
          </div>
          {utang.payments.length > 0 && (
            <div>
              <div className="text-[11px] text-stone-500 font-semibold mb-1 uppercase tracking-wide">Bayad</div>
              {utang.payments.map((p) => (
                <div key={p.id} className="flex justify-between text-xs py-1 text-green-400">
                  <span>{fmtDate(p.ts)}</span><span>+{money(p.amount)}</span>
                </div>
              ))}
              <div className="flex justify-between text-xs py-1 border-t border-stone-800 mt-1 font-semibold">
                <span className="text-stone-400">Balance</span>
                <span className={balance <= 0 ? "text-green-400" : "text-red-400"}>{money(balance)}</span>
              </div>
            </div>
          )}
          {!utang.settled && (
            !isPayingOpen
              ? <button onClick={onTogglePay} className="w-full bg-green-500/20 text-green-400 border border-green-500/40 font-semibold rounded-lg py-2 text-sm">💵 Maningil / Mag-bayad</button>
              : <div className="space-y-2">
                  <div className="flex gap-2">
                    <input type="number" inputMode="decimal" value={payAmt} onChange={(e) => setPayAmt(e.target.value)} placeholder={`Max ${money(balance)}`}
                      className="flex-1 bg-stone-900 border border-stone-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400/60" />
                    <button onClick={() => setPayAmt(String(balance))} className="text-xs bg-stone-800 text-stone-300 rounded-lg px-2.5 font-semibold shrink-0">Full</button>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={onTogglePay} className="flex-1 bg-stone-800 text-stone-400 rounded-lg py-2 text-sm font-semibold">Cancel</button>
                    <button onClick={() => { if(canPay){ onAddPayment(utang.id, Math.min(Number(payAmt), balance)); setPayAmt(""); onTogglePay(); }}} disabled={!canPay}
                      className="flex-1 bg-green-500 disabled:bg-stone-800 disabled:text-stone-600 text-white rounded-lg py-2 text-sm font-bold">
                      Bayad {payAmt ? money(Number(payAmt)) : ""}
                    </button>
                  </div>
                </div>
          )}
          <button onClick={() => onDelete(utang.id)} className="w-full text-red-400 text-xs font-semibold py-1.5">Burahin ang utang na ito</button>
        </div>
      )}
    </div>
  );
}

// ---------- INVENTORY TAB ----------
function InventoryTab({ products, onAdd, onUpdate, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  return (
    <div className="px-4 pt-3">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-sm font-semibold text-stone-400">{products.length} product(s)</h2>
        <button onClick={() => { setEditing(null); setShowForm(true); }} className="bg-amber-400 text-stone-950 text-sm font-bold rounded-lg px-3 py-1.5 flex items-center gap-1">
          <Icon name="plus" size={16} strokeWidth={3} /> Add
        </button>
      </div>
      {products.length === 0 ? <EmptyState icon="package" title="No products yet" body='Tap "Add" to create your first product.' />
        : <div className="space-y-2">{products.map((p) => (
            <div key={p.id} className="bg-stone-900 border border-stone-800 rounded-xl p-3 flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-sm">{p.name}</div>
                <div className="text-xs text-stone-500 mt-0.5">{money(p.price)}{p.unit === "kg" ? "/kg" : ""} · {fmtQty(p.stock, p.unit)} {unitLabel(p.unit)} in stock{p.cost ? ` · cost ${money(p.cost)}` : ""}</div>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={() => { setEditing(p); setShowForm(true); }} className="text-stone-400 text-xs font-semibold px-2.5 py-1.5 rounded-lg bg-stone-800">Edit</button>
                <button onClick={() => onDelete(p.id)} className="text-red-400 p-1.5 rounded-lg bg-stone-800 ml-1"><Icon name="trash-2" size={14} /></button>
              </div>
            </div>
          ))}</div>
      }
      {showForm && <ProductForm initial={editing} onClose={() => setShowForm(false)}
        onSave={(data) => { if (editing) onUpdate(editing.id, data); else onAdd(data); setShowForm(false); }} />}
    </div>
  );
}

function ProductForm({ initial, onClose, onSave }) {
  const [name, setName] = useState(initial?.name || "");
  const [unit, setUnit] = useState(initial?.unit || "pc");
  const [price, setPrice] = useState(initial?.price ?? "");
  const [cost, setCost] = useState(initial?.cost ?? "");
  const [stock, setStock] = useState(initial?.stock ?? "");
  const isKg = unit === "kg";
  const valid = name.trim() && price !== "" && stock !== "" && Number(price) >= 0 && Number(stock) >= 0;
  return (
    <div className="fixed inset-0 z-40 flex items-end">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div className="relative w-full bg-stone-950 rounded-t-2xl border-t border-stone-800 p-4 pb-6 safe-bottom">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold">{initial ? "Edit product" : "Add product"}</h2>
          <button onClick={onClose} className="text-stone-500 p-1"><Icon name="x" size={20} /></button>
        </div>
        <div className="space-y-3">
          <label className="block"><span className="block text-xs text-stone-500 mb-1 font-medium">Product name</span>
            <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder='e.g., "Coke 1.5L"' className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60" /></label>
          <label className="block"><span className="block text-xs text-stone-500 mb-1 font-medium">Sold by</span>
            <div className="grid grid-cols-2 gap-2">
              {[{id:"pc",label:"Piece",hint:"count items"},{id:"kg",label:"Kilogram",hint:"weigh items"}].map((opt) => (
                <button key={opt.id} type="button" onClick={() => setUnit(opt.id)} className={`rounded-lg border px-3 py-2 text-left transition-colors ${unit === opt.id ? "bg-amber-400/10 border-amber-400/60" : "bg-stone-900 border-stone-800"}`}>
                  <div className={`text-sm font-semibold ${unit === opt.id ? "text-amber-400" : "text-stone-200"}`}>{opt.label}</div>
                  <div className="text-[11px] text-stone-500">{opt.hint}</div>
                </button>
              ))}
            </div>
          </label>
          <div className="grid grid-cols-2 gap-3">
            <label className="block"><span className="block text-xs text-stone-500 mb-1 font-medium">{isKg ? "Price (₱/kg)" : "Price (₱)"}</span>
              <input type="number" inputMode="decimal" value={price} onChange={(e) => setPrice(e.target.value)} placeholder="0.00" className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60" /></label>
            <label className="block"><span className="block text-xs text-stone-500 mb-1 font-medium">{isKg ? "Cost (₱/kg, opt)" : "Cost (₱, opt)"}</span>
              <input type="number" inputMode="decimal" value={cost} onChange={(e) => setCost(e.target.value)} placeholder="0.00" className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60" /></label>
          </div>
          <label className="block"><span className="block text-xs text-stone-500 mb-1 font-medium">{isKg ? "Stock (kg)" : "Stock quantity"}</span>
            <input type="number" inputMode={isKg ? "decimal" : "numeric"} step={isKg ? "0.1" : "1"} value={stock} onChange={(e) => setStock(e.target.value)} placeholder={isKg ? "0.0" : "0"} className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60" /></label>
        </div>
        <button disabled={!valid} onClick={() => onSave({ name: name.trim(), unit, price: Number(price), cost: cost === "" ? 0 : Number(cost), stock: Number(stock) })}
          className="w-full mt-5 bg-amber-400 disabled:bg-stone-800 disabled:text-stone-600 text-stone-950 font-bold rounded-xl py-3 transition-colors">
          {initial ? "Save changes" : "Add product"}
        </button>
      </div>
    </div>
  );
}

// ---------- REPORTS TAB ----------
function ReportsTab({ sales, products }) {
  const [range, setRange] = useState("today");
  const filteredSales = useMemo(() => range === "all" ? sales : sales.filter((s) => todayKey(new Date(s.ts)) === todayKey()), [sales, range]);
  const totals = useMemo(() => {
    let revenue = 0, profit = 0, lineCount = 0;
    for (const s of filteredSales) for (const it of s.items) { revenue += it.qty * it.price; profit += it.qty * (it.price - (it.cost||0)); lineCount++; }
    return { revenue, profit, lineCount, count: filteredSales.length };
  }, [filteredSales]);
  const stockPc = products.filter((p) => (p.unit||"pc") === "pc").reduce((a,p) => a+p.stock, 0);
  const stockKg = products.filter((p) => p.unit === "kg").reduce((a,p) => a+p.stock, 0);
  const sortedSales = [...filteredSales].sort((a,b) => b.ts - a.ts);
  return (
    <div className="px-4 pt-3">
      <div className="flex gap-2 mb-4">
        {[{id:"today",label:"Today"},{id:"all",label:"All time"}].map((r) => (
          <button key={r.id} onClick={() => setRange(r.id)} className={`text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors ${range === r.id ? "bg-amber-400 text-stone-950 border-amber-400" : "bg-stone-900 text-stone-400 border-stone-800"}`}>{r.label}</button>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-2.5 mb-4">
        {[["Sales", totals.count, false],["Products sold", totals.lineCount, false],["Revenue", money(totals.revenue), true],["Profit", money(totals.profit), true]].map(([label, value, accent]) => (
          <div key={label} className="bg-stone-900 border border-stone-800 rounded-xl p-3.5">
            <div className="text-xs text-stone-500 mb-1">{label}</div>
            <div className={`text-xl font-bold ${accent ? "text-amber-400" : "text-stone-100"}`}>{value}</div>
          </div>
        ))}
      </div>
      <div className="bg-stone-900 border border-stone-800 rounded-xl px-3.5 py-3 mb-5 space-y-1.5">
        <div className="flex items-center justify-between"><span className="text-sm text-stone-400">Stock — pieces</span><span className="font-bold">{stockPc} pc</span></div>
        <div className="flex items-center justify-between"><span className="text-sm text-stone-400">Stock — by weight</span><span className="font-bold">{Math.round(stockKg*100)/100} kg</span></div>
      </div>
      <h3 className="text-sm font-semibold text-stone-400 mb-2">{range === "today" ? "Today's sales" : "All sales"}</h3>
      {sortedSales.length === 0 ? <EmptyState icon="receipt" title="No sales yet" body="Completed sales will show up here." />
        : <div className="space-y-2">{sortedSales.map((s) => {
            const [open, setOpen] = [false, () => {}]; // handled inside SaleRow
            return <SaleRow key={s.id} sale={s} />;
          })}</div>
      }
    </div>
  );
}

function SaleRow({ sale }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="bg-stone-900 border border-stone-800 rounded-xl overflow-hidden">
      <button onClick={() => setOpen((v)=>!v)} className="w-full flex items-center justify-between px-3.5 py-3">
        <div className="text-left">
          <div className="text-sm font-medium">{fmtDate(sale.ts)}</div>
          <div className="text-xs text-stone-500">{sale.items.length} product{sale.items.length === 1 ? "" : "s"}</div>
        </div>
        <div className="font-bold text-amber-400">{money(sale.total)}</div>
      </button>
      {open && <div className="px-3.5 pb-3 pt-0 border-t border-stone-800/70">
        {sale.items.map((it, i) => (
          <div key={i} className="flex items-center justify-between text-xs py-1.5 text-stone-400">
            <span>{fmtQty(it.qty, it.unit)} {unitLabel(it.unit)} × {it.name}</span>
            <span>{money(it.qty * it.price)}</span>
          </div>
        ))}
      </div>}
    </div>
  );
}

function EmptyState({ icon, title, body }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-16 px-6">
      <div className="w-12 h-12 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center mb-3">
        <Icon name={icon} size={20} className="text-stone-600" />
      </div>
      <div className="font-semibold text-sm mb-1">{title}</div>
      <div className="text-xs text-stone-500">{body}</div>
    </div>
  );
}

// ---------- ERROR BOUNDARY ----------
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) return (
      <div className="counter-app-mounted" style={{minHeight:"100vh",background:"#0c0a09",color:"#f5f5f4",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",textAlign:"center",fontFamily:"-apple-system,sans-serif"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Something went wrong</div>
        <div style={{fontSize:13,color:"#a8a29e",marginBottom:16,maxWidth:320}}>The app hit an error. Reloading usually fixes it.</div>
        <div style={{fontSize:11,color:"#78716c",fontFamily:"monospace",maxWidth:320,wordBreak:"break-word",marginBottom:20,background:"#1c1917",padding:10,borderRadius:8}}>{String(this.state.error?.message || this.state.error)}</div>
        <button onClick={() => window.location.reload()} style={{background:"#fbbf24",color:"#0c0a09",fontWeight:700,border:"none",borderRadius:10,padding:"10px 20px",fontSize:14}}>Reload</button>
      </div>
    );
    return this.props.children;
  }
}

window.addEventListener("error", (e) => console.error("Global error:", e.error || e.message));
window.addEventListener("unhandledrejection", (e) => console.error("Unhandled rejection:", e.reason));

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch((e) => console.warn("SW failed", e));
  });
}
</script>
</body>
</html>
